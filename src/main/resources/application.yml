spring:
  application:
    name: gola-backend
  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/goladb}
    username: ${DB_USERNAME:gola}
    password: ${DB_PASSWORD:gola123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      repositories:
        enabled: false

  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true

gola:
  jwt:
    secret: ${JWT_SECRET:please-change-this-secret-in-production-must-be-256-bits}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_FROM_NUMBER:}
  google-places:
    api-key: ${GOOGLE_PLACES_API_KEY:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash
  rate-limit:
    enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always